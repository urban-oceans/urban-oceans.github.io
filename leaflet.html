<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Leaflet Polygon Percent Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    /* --- PAGE LAYOUT --- */
    body {
      display: flex;
      flex-direction: row;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Left side table */
    #sidebar {
      width: 50%;
      padding: 20px;
      overflow-y: auto;
    }

    /* Right side map */
    #map {
      width: 50%;
      height: 900px; /* Taller map */
    }

    /* Table styling */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ccc;
      text-align: left;
    }

    th {
      background: #f0f8ff;
    }

    /* Map label styling (inline text, no box) */
    .region-label {
      background: transparent;
      padding: 0px;
      font-size: 14px;
      font-weight: 600;
      color: #003f5c;
      text-shadow: 1px 1px 2px white;
      border: none;
    }

    /* Legend styling */
    .info.legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      line-height: 18px;
      color: #333;
      border: 1px solid #ccc;
      font-size: 13px;
    }

    .info.legend i {
      width: 20px;
      height: 12px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<!-- LEFT SIDE: TABLE -->
<div id="sidebar">
  <h2>Percent Distribution of Studies by Region</h2>
  <table id="regionTable">
    <tr>
      <th>Region</th>
      <th>Percent of Studies</th>
    </tr>
  </table>
</div>

<!-- RIGHT SIDE: MAP -->
<div id="map"></div>

<script>
// Initialize map
const map = L.map('map').setView([49.25, -123.1], 10);

// Basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

/* -----------------------------------------------------
   LOAD CSV FILE (WKT POLYGON PARSER)
----------------------------------------------------- */

async function loadCSV() {
  const response = await fetch("Area Polygons.csv");
  const text = await response.text();

  const rows = text.trim().split("\n").slice(1); // skip header

  const regions = [];

  rows.forEach(row => {
    const firstQuote = row.indexOf('"');
    const secondQuote = row.indexOf('"', firstQuote + 1);

    const wkt = row.slice(firstQuote + 1, secondQuote); // POLYGON ((...))
    const rest = row.slice(secondQuote + 2).split(",");

    const name = rest[0].trim();
    const percent = Number(rest[1].trim());

    const inner = wkt
      .replace("POLYGON ((", "")
      .replace("))", "")
      .trim();

    const coords = inner.split(",").map(pair => {
      const [lng, lat] = pair.trim().split(" ").map(Number);
      return [lat, lng];
    });

    regions.push({ name, percent, polygon: coords });
  });

  return regions;
}

/* -----------------------------------------------------
   COLOR SCALE
----------------------------------------------------- */

function getColor(p) {
  return p > 0.40 ? "#ff6600" :
         p > 0.35 ? "#ffa64d" :
         p > 0.20 ? "#ffd9b3" :
         p > 0.10 ? "#e6f2ff" :
                    "#f7fbff";
}

/* -----------------------------------------------------
   BUILD MAP + TABLE
----------------------------------------------------- */

loadCSV().then(regions => {
  const table = document.getElementById("regionTable");

  regions.forEach(region => {

    /* --- Add row to table --- */
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${region.name}</td>
      <td>${(region.percent * 100).toFixed(2)}%</td>
    `;
    table.appendChild(row);

    /* --- Draw polygon --- */
    L.polygon(region.polygon, {
      color: "#005f8f",
      fillColor: getColor(region.percent),
      fillOpacity: 0.6,
      weight: 2
    })
    .addTo(map)
    .bindPopup(`
      <b>${region.name}</b><br>
      ${(region.percent * 100).toFixed(2)}%
    `);

    /* --- Compute centroid for label --- */
    const centroidLat = region.polygon.reduce((sum, c) => sum + c[0], 0) / region.polygon.length;
    const centroidLng = region.polygon.reduce((sum, c) => sum + c[1], 0) / region.polygon.length;

    /* --- Add inline label (one line) --- */
    L.marker([centroidLat, centroidLng], {
      icon: L.divIcon({
        className: "region-label",
        html: `${region.name} (${(region.percent * 100).toFixed(1)}%)`,
        iconSize: [120, 20]
      })
    }).addTo(map);
  });
});

/* -----------------------------------------------------
   LEGEND
----------------------------------------------------- */

const legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
  const div = L.DomUtil.create("div", "info legend");
  const grades = [0, 0.10, 0.20, 0.35, 0.40];

  div.innerHTML += "<h4>Percent of Studies</h4>";

  for (let i = 0; i < grades.length; i++) {
    const from = grades[i];
    const to = grades[i + 1];

    div.innerHTML +=
      `<i style="background:${getColor(from + 0.001)}"></i> ` +
      `${(from * 100).toFixed(0)}%` +
      (to ? `–${(to * 100).toFixed(0)}%<br>` : "+%");
  }

  return div;
};

legend.addTo(map);
</script>

</body>
</html>
