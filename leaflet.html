<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Leaflet Polygon Percent Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 550px;
      width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }

    /* Region label styling */
    .region-label {
      background: rgba(255,255,255,0.85);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      color: #003f5c;
      border: 1px solid #c0d7e0;
    }

    /* Legend styling */
    .info.legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      line-height: 18px;
      color: #333;
      border: 1px solid #ccc;
      font-size: 13px;
    }

    .info.legend i {
      width: 20px;
      height: 12px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<h2>Percent Distribution of Studies by Region</h2>
<div id="map"></div>

<script>
// Initialize map
const map = L.map('map').setView([49.25, -123.1], 10);

// Basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

/* -----------------------------------------------------
   LOAD CSV FILE (WKT POLYGON PARSER)
----------------------------------------------------- */

async function loadCSV() {
  const response = await fetch("Area Polygons.csv");
  const text = await response.text();

  const rows = text.trim().split("\n").slice(1); // skip header

  const regions = [];

  rows.forEach(row => {
    // Extract WKT polygon inside quotes
    const firstQuote = row.indexOf('"');
    const secondQuote = row.indexOf('"', firstQuote + 1);

    const wkt = row.slice(firstQuote + 1, secondQuote); // POLYGON ((...))
    const rest = row.slice(secondQuote + 2).split(",");

    const name = rest[0].trim();
    const percent = Number(rest[1].trim());

    // Remove POLYGON (( and ))
    const inner = wkt
      .replace("POLYGON ((", "")
      .replace("))", "")
      .trim();

    // Split into coordinate pairs
    const coords = inner.split(",").map(pair => {
      const [lng, lat] = pair.trim().split(" ").map(Number);
      return [lat, lng]; // Leaflet uses [lat, lng]
    });

    regions.push({ name, percent, polygon: coords });
  });

  return regions;
}

/* -----------------------------------------------------
   COLOR SCALE BASED ON PERCENT DISTRIBUTION
----------------------------------------------------- */

function getColor(p) {
  return p > 0.40 ? "#ff6600" :
         p > 0.35 ? "#ffa64d" :
         p > 0.20 ? "#ffd9b3" :
         p > 0.10 ? "#e6f2ff" :
                    "#f7fbff";
}

/* -----------------------------------------------------
   BUILD MAP USING CSV VALUES
----------------------------------------------------- */

loadCSV().then(regions => {
  regions.forEach(region => {

    // Draw polygon
    L.polygon(region.polygon, {
      color: "#005f8f",
      fillColor: getColor(region.percent),
      fillOpacity: 0.6,
      weight: 2
    })
    .addTo(map)
    .bindPopup(`
      <b>${region.name}</b><br>
      Percent of studies: ${(region.percent * 100).toFixed(2)}%
    `);

    // Compute centroid for label
    const centroidLat = region.polygon.reduce((sum, c) => sum + c[0], 0) / region.polygon.length;
    const centroidLng = region.polygon.reduce((sum, c) => sum + c[1], 0) / region.polygon.length;

    // Add region label
    L.marker([centroidLat, centroidLng], {
      icon: L.divIcon({
        className: "region-label",
        html: `<b>${region.name}</b><br>${(region.percent * 100).toFixed(1)}%`,
        iconSize: [100, 40]
      })
    }).addTo(map);
  });
});

/* -----------------------------------------------------
   LEGEND
----------------------------------------------------- */

const legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
  const div = L.DomUtil.create("div", "info legend");
  const grades = [0, 0.10, 0.20, 0.35, 0.40];

  div.innerHTML += "<h4>Percent of Studies</h4>";

  for (let i = 0; i < grades.length; i++) {
    const from = grades[i];
    const to = grades[i + 1];

    div.innerHTML +=
      `<i style="background:${getColor(from + 0.001)}"></i> ` +
      `${(from * 100).toFixed(0)}%` +
      (to ? `–${(to * 100).toFixed(0)}%<br>` : "+%");
  }

  return div;
};

legend.addTo(map);
</script>

</body>
</html>
