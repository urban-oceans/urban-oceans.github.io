<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Research Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 500px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Research Articles Map</h1>
<p>Explore articles by location, topic, and year.</p>

<div id="map"></div>

<script>
// Initialize map
const map = L.map('map').setView([49.2827, -123.1207], 11);

// Basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// Load your GeoJSON
fetch("articles.geojson")
  .then(res => res.json())
  .then(data => {
    L.geoJSON(data, {
      onEachFeature: (feature, layer) => {
        layer.bindPopup(`
          <b>${feature.properties.title}</b><br>
          Topic: ${feature.properties.topic}<br>
          Location: ${feature.properties.location}<br>
          Year: ${feature.properties.year}
        `);
      }
    }).addTo(map);
  });
</script>

</body>
</html>
