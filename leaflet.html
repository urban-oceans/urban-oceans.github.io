<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Leaflet Polygon Percent Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 550px;
      width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>Percent Distribution of Studies by Region</h2>
<div id="map"></div>

<script>
// Initialize map
const map = L.map('map').setView([49.25, -123.1], 10);

// Basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

/* -----------------------------------------------------
   LOAD CSV FILE
----------------------------------------------------- */

async function loadCSV() {
  const response = await fetch("Area Polygons.csv");
  const text = await response.text();

  const rows = text.trim().split("\n").slice(1); // skip header

  const regions = [];

  rows.forEach(row => {
    const [polygonStr, name, percentStr] = row.split(",");

    // Parse polygon string "(lat lng)(lat lng)..."
    const coords = polygonStr
      .trim()
      .split(")")
      .filter(s => s.trim() !== "")
      .map(s => {
        const cleaned = s.replace("(", "").trim();
        const [lat, lng] = cleaned.split(" ").map(Number);
        return [lat, lng];
      });

    regions.push({
      name: name.trim(),
      percent: Number(percentStr.trim()),
      polygon: coords
    });
  });

  return regions;
}

/* -----------------------------------------------------
   COLOR SCALE BASED ON PERCENT DISTRIBUTION
----------------------------------------------------- */

function getColor(p) {
  return p > 0.40 ? "#ff6600" :      // very high
         p > 0.35 ? "#ffa64d" :      // high
         p > 0.20 ? "#ffd9b3" :      // medium
         p > 0.10 ? "#e6f2ff" :      // low
                     "#f7fbff";      // very low
}

/* -----------------------------------------------------
   BUILD MAP USING CSV VALUES
----------------------------------------------------- */

loadCSV().then(regions => {

  regions.forEach(region => {

    L.polygon(region.polygon, {
      color: "#005f8f",
      fillColor: getColor(region.percent),
      fillOpacity: 0.6,
      weight: 2
    })
    .addTo(map)
    .bindPopup(`
      <b>${region.name}</b><br>
      Percent of studies: ${(region.percent * 100).toFixed(2)}%
    `);

  });

});
</script>

</body>
</html>
